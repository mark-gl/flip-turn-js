<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>flip-turn-js</title>
    <link rel="stylesheet" href="./demo.css" />
  </head>
  <body>
    <header class="page-toolbar">
      <div class="toolbar-contents container">
        <a href="./demo.html" class="title">flip-turn.js demo</a>
        <div id="toolbar-links">
          <a href="https://mark-gl.github.io/flip-turn-js/typedoc"
            >API reference</a
          >
          <a href="https://github.com/mark-gl/flip-turn-js">View on GitHub</a>
        </div>
      </div>
    </header>
    <div class="settings">
      <div class="display-modes" role="radiogroup" aria-label="Display mode">
        <label>
          <input type="radio" name="display" value="auto" checked />
          Auto layout
        </label>
        <label>
          <input type="radio" name="display" value="single" />
          Single page
        </label>
        <label>
          <input type="radio" name="display" value="double" />
          Double page
        </label>
      </div>
      <div class="toggles">
        <button id="button-renderer">Mesh renderer: off</button>
        <button id="button-hard-covers">Hard covers: off</button>
        <label
          id="hard-cover-thickness-setting"
          class="setting-range"
          for="hard-cover-thickness"
          hidden
        >
          Cover thickness
          <input
            id="hard-cover-thickness"
            type="range"
            min="0"
            max="24"
            step="1"
            value="8"
          />
          <span id="hard-cover-thickness-value">8px</span>
        </label>
      </div>
    </div>
    <main class="demo-main">
      <div id="magazine" data-display="auto">
        <img src="./assets/01.jpg" alt="Demo page 1" />
        <img src="./assets/02.jpg" alt="Demo page 2" />
        <img src="./assets/03.jpg" alt="Demo page 3" />
        <img src="./assets/04.jpg" alt="Demo page 4" />
        <img src="./assets/05.jpg" alt="Demo page 5" />
        <img src="./assets/06.jpg" alt="Demo page 6" />
      </div>
    </main>
    <script type="module" src="./demo.ts"></script>
  </body>
</html>
